server.port=8080
spring.datasource.url=jdbc:mysql://localhost:3306/library_db
spring.datasource.username=root
spring.datasource.password=12345678
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Cấu hình Mail (Nếu không dùng tính năng gửi mail thì có thể tạm để trống)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:default@gmail.com}
spring.mail.password=${MAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Thêm timeout để tránh hang khi SMTP server không phản hồi
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Cấu hình tính năng mượn trả
library.borrow.default-days=7

# Logging: xem rõ kết quả gửi email trong console
logging.level.com.library.app.infrastructure.notification=INFO
logging.level.org.springframework.mail=DEBUG