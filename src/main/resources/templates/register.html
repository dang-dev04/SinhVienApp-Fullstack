<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đăng ký - Quản lý Thư viện</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .register-container {
            max-width: 400px;
            margin: 80px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h3 class="text-center mb-4">Mở thẻ Độc Giả</h3>
        
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        
        <form th:action="@{/register}" method="post">
            <div class="mb-3">
                <label>Họ và Tên</label>
                <input type="text" name="fullName" class="form-control" required placeholder="Nguyễn Văn A">
            </div>
            <div class="mb-3">
                <label>Email đăng nhập</label>
                <input type="email" name="email" class="form-control" required placeholder="email@domain.com">
            </div>
            <div class="mb-3">
                <label>Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Đăng ký mượn sách</button>
            <div class="text-center mt-3">
                <a th:href="@{/}">Đã có tài khoản? Đăng nhập</a>
            </div>
        </form>
    </div>
</body>
</html>
