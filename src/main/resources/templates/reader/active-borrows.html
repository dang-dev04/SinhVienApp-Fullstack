<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{reader/layout :: head('Sách đang mượn - E-Library')}">
</head>
<body>

<div th:replace="~{reader/layout :: navbar}"></div>

<main>
    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold"><i class="fa-solid fa-book-reader text-primary me-2"></i>Sách Bạn Đang Mượn</h3>
        </div>

        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert" id="successAlert">
            <i class="fa-solid fa-circle-check me-2"></i> Yêu cầu mượn sách đã được gửi! Vui lòng chờ Thủ thư duyệt.
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${#lists.isEmpty(borrows)}" class="text-center py-5 bg-white rounded-4 shadow-sm border border-light">
            <img src="https://cdni.iconscout.com/illustration/premium/thumb/empty-state-2130362-1800926.png" width="200" alt="Empty" class="mb-3 opacity-75">
            <h5 class="text-muted fw-bold">Hiện bạn chưa có sách nào đang mượn</h5>
            <p class="text-muted mb-4">Hãy dạo quanh thư viện và tìm một vài cuốn sách ngay nhé.</p>
            <a href="/reader/home" class="btn btn-brand rounded-pill px-4">Khám phá sách</a>
        </div>

        <div th:unless="${#lists.isEmpty(borrows)}" class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div class="col" th:each="b : ${borrows}">
                <div class="card h-100 border-0 shadow-sm rounded-4 position-relative overflow-hidden">
                    <!-- Trạng thái viền trên -->
                    <div th:if="${b.status == 'PENDING'}" class="position-absolute top-0 start-0 w-100" style="height: 4px; background: #f59e0b;"></div>
                    <div th:if="${b.status == 'BORROWING'}" class="position-absolute top-0 start-0 w-100" style="height: 4px; background: #10b981;"></div>
                    <div th:if="${b.status == 'RENEW_PENDING'}" class="position-absolute top-0 start-0 w-100" style="height: 4px; background: #6366f1;"></div>

                    <div class="card-body d-flex p-4">
                        <img th:src="${b.book.image != null} ? ${b.book.image} : 'https://via.placeholder.com/100x150'" 
                             class="rounded-3 shadow-sm me-3" style="width: 80px; height: 120px; object-fit: cover;" alt="Cover">
                        
                        <div class="w-100">
                            <h6 class="fw-bold text-truncate mb-1" th:title="${b.book.title}" th:text="${b.book.title}">Tên Sách</h6>
                            <p class="small text-muted mb-3" th:text="${b.book.author}">Tác giả</p>
                            
                            <div th:if="${b.status == 'PENDING'}" class="badge bg-warning text-dark mb-2 rounded-pill"><i class="fa-solid fa-hourglass-half me-1"></i>Đang chờ duyệt</div>
                            <div th:if="${b.status == 'BORROWING'}" class="badge bg-success mb-2 rounded-pill"><i class="fa-solid fa-check me-1"></i>Đang mượn</div>
                            <div th:if="${b.status == 'RENEW_PENDING'}" class="badge bg-indigo text-white mb-2 rounded-pill" style="background:#6366f1;"><i class="fa-solid fa-clock-rotate-left me-1"></i>Chờ duyệt gia hạn</div>

                            <p class="small mb-1"><i class="fa-regular fa-calendar me-1 text-secondary"></i>Ngày mượn: <span th:text="${b.borrowDate != null ? b.borrowDate : 'Chưa nhận sách'}"></span></p>
                            
                            <!-- Tính toán hạn trả giả định là 14 ngày (nếu đang mượn) -->
                            <p th:if="${b.borrowDate != null && b.status == 'BORROWING'}" class="small mb-0 text-danger fw-bold">
                                <i class="fa-solid fa-triangle-exclamation me-1"></i>Hạn trả: <span th:text="${b.borrowDate.plusDays(14)}"></span>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{reader/layout :: footer}"></div>
<script>
    // Tự động sử dụng toastr nếu URL có ?success=true
    document.addEventListener("DOMContentLoaded", function() {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('success')) {
            Toast.fire({
              icon: 'success',
              title: 'Đăng ký mượn sách thành công!'
            });
            // Xóa query param để f5 không hiện lại
            window.history.replaceState({}, document.title, window.location.pathname);
            
            // Xóa alert html nếu dùng toast
            var alertNode = document.getElementById('successAlert');
            if(alertNode) alertNode.remove();
        }
    });
</script>
</body>
</html>
