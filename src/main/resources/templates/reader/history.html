<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{reader/layout :: head('Lịch sử mượn trả - E-Library')}">
</head>
<body>

<div th:replace="~{reader/layout :: navbar}"></div>

<main>
    <div class="container my-5">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
            <h3 class="fw-bold m-0"><i class="fa-solid fa-clock-rotate-left text-secondary me-2"></i>Lịch Sử Hoạt Động</h3>
            
            <div class="input-group" style="max-width: 350px;">
                <span class="input-group-text bg-white text-muted border-end-0"><i class="fa-solid fa-search"></i></span>
                <input type="text" id="tableFilter" class="form-control border-start-0 ps-0 shadow-none" placeholder="Tìm kiếm tên sách...">
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0" id="historyTable">
                    <thead class="table-light">
                        <tr>
                            <th scope="col" class="ps-4">Sách</th>
                            <th scope="col">Ngày Mượn</th>
                            <th scope="col">Hạn Trả</th>
                            <th scope="col">Ngày Trả Thực Tế</th>
                            <th scope="col">Trạng Thái</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${#lists.isEmpty(borrows)}">
                            <td colspan="4" class="text-center py-5 text-muted">Không có dữ liệu lịch sử nào.</td>
                        </tr>
                        <tr th:each="b : ${borrows}" th:unless="${#lists.isEmpty(borrows)}" class="history-row">
                            <td class="ps-4">
                                <div class="d-flex align-items-center">
                                    <img th:src="${b.book.image != null} ? ${b.book.image} : 'https://via.placeholder.com/50x70'" 
                                         class="rounded me-3" style="width: 40px; height: 60px; object-fit: cover;">
                                    <div>
                                        <h6 class="mb-0 fw-bold book-title" th:text="${b.book.title}">Title</h6>
                                        <small class="text-muted" th:text="${b.book.author}">Author</small>
                                    </div>
                                </div>
                            </td>
                            <td th:text="${b.borrowDate != null ? #temporals.format(b.borrowDate, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${b.dueDate != null ? #temporals.format(b.dueDate, 'dd/MM/yyyy') : '-'}"></td>
                            <td th:text="${b.returnDate != null ? #temporals.format(b.returnDate, 'dd/MM/yyyy') : '-'}"></td>
                            <td>
                                <span th:if="${b.status == 'PENDING'}" class="badge bg-warning text-dark border"><i class="fa-solid fa-spinner fa-spin me-1"></i>Chờ Duyệt</span>
                                <span th:if="${b.status == 'BORROWING'}" class="badge bg-primary"><i class="fa-solid fa-book-open me-1"></i>Đang Mượn</span>
                                <span th:if="${b.status == 'OVERDUE'}" class="badge bg-danger"><i class="fa-solid fa-circle-exclamation me-1"></i>Quá Hạn</span>
                                <span th:if="${b.status == 'RETURNED'}" class="badge bg-success"><i class="fa-solid fa-check me-1"></i>Đã Trả</span>
                                <span th:if="${b.status == 'REJECTED'}" class="badge bg-danger"><i class="fa-solid fa-xmark me-1"></i>Bị Từ Chối</span>
                                <span th:if="${b.status == 'RENEW_PENDING'}" class="badge bg-info text-dark"><i class="fa-solid fa-rotate me-1"></i>Xin Gia Hạn</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{reader/layout :: footer}"></div>

<script>
    document.getElementById('tableFilter').addEventListener('keyup', function() {
        let keyword = this.value.toLowerCase();
        let rows = document.querySelectorAll('.history-row');
        
        rows.forEach(row => {
            let title = row.querySelector('.book-title').innerText.toLowerCase();
            if (title.indexOf(keyword) > -1) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
</body>
</html>
